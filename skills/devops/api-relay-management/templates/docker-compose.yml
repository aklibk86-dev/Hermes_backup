# New-API Docker Compose — PostgreSQL + Redis
# Save to /opt/new-api/docker-compose.yml and run:
#   cd /opt/new-api && docker compose up -d

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      # ⚠️ Set both passwords to the same value. Use openssl rand -hex 16 to generate.
      - SQL_DSN=postgresql://newapi:CHANGE_ME@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://:CHANGE_ME@redis:6379
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-node-1
    depends_on:
      - redis
      - postgres
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o 'success.*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: new-api-redis
    restart: always
    command: ["redis-server", "--requirepass", "NewApi2024"]
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: new-api-postgres
    restart: always
    environment:
      POSTGRES_USER: newapi
      POSTGRES_PASSWORD: ***
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newapi -d new-api"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:

networks:
  new-api-network:
    driver: bridge
