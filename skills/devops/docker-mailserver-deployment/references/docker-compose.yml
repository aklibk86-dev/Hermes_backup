## New-API 邮件配置

在后台 → 系统设置 → 邮件设置：

| 参数 | 值 |
|------|-----|
| SMTP 主机 | 127.0.0.1 |
| SMTP 端口 | 25 |
| 发件地址 | admin@aklibk.com |
| 用户名/密码 | 留空（本地免认证） |
